<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jelly C - Animated Mascot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #001232;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  .svg-container {
    width: 90vmin; height: 90vmin;
    display: flex; align-items: center; justify-content: center;
  }
  .svg-container svg { width: 100%; height: 100%; }

  /* Float + mouse tilt handled in JS */

  /* Gears, stars, diamonds all animated via JS */

  @keyframes shimmer { 0%, 100% { opacity: 0.34; } 50% { opacity: 0.55; } }
  .bell-highlight { animation: shimmer 3s ease-in-out infinite; }

  .particle {
    position: absolute; border-radius: 50%;
    background: rgba(150, 180, 220, 0.3);
    animation: pfloat 6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pfloat {
    0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
    20% { opacity: 0.5; }
    50% { transform: translateY(-30px) translateX(10px); opacity: 0.3; }
    80% { opacity: 0.5; }
  }

  /* Think button */
  .think-btn {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(136, 204, 255, 0.1);
    border: 1px solid rgba(136, 204, 255, 0.3);
    color: rgba(200, 220, 240, 0.8);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    letter-spacing: 1.5px;
    padding: 10px 28px;
    border-radius: 24px;
    cursor: pointer;
    transition: all 0.3s ease;
    z-index: 10;
    text-transform: uppercase;
  }
  .think-btn:hover {
    background: rgba(136, 204, 255, 0.2);
    border-color: rgba(136, 204, 255, 0.5);
    color: rgba(220, 235, 250, 1);
  }
  .think-btn.active {
    background: rgba(136, 204, 255, 0.25);
    border-color: rgba(136, 204, 255, 0.6);
    color: #88ccff;
    pointer-events: none;
  }
</style>
</head>
<body>
<button class="think-btn" id="thinkBtn">Think</button>

// Smooth tilt + velocity tracking for jelly wobble
let smoothTiltX = 0, smoothTiltY = 0;

function updateJellyTilt(time) {
  const t = time / 1000;

  // Track velocity before smoothing
  const prevSX = smoothTiltX;
  const prevSY = smoothTiltY;

  // Lerp toward target
  smoothTiltX += (jellyTiltX - smoothTiltX) * 0.04;
  smoothTiltY += (jellyTiltY - smoothTiltY) * 0.04;

  // Velocity = change in smoothed tilt per frame (for jelly wobble)
  jellyVelX = smoothTiltX - prevSX;
  jellyVelY = smoothTiltY - prevSY;
  // Smooth the velocity too for less jitter
  smoothVelX += (jellyVelX - smoothVelX) * 0.15;
  smoothVelY += (jellyVelY - smoothVelY) * 0.15;

  // Float bob
  const bobY = -10 + 10 * Math.cos(t * BOB_FREQ);

  // More exaggerated follow
  const shiftX = smoothTiltX * 30;   // max ~30px shift
  const shiftY = smoothTiltY * 15;   // max ~15px shift

  svgContainer.style.transform =
    `translateY(${bobY}px) translateX(${shiftX}px) translateY(${shiftY}px) rotate(${rotate}deg)`;

  requestAnimationFrame(updateJellyTilt);
}

// --- Animation with smooth Catmull-Rom curves ---
const BOB_PERIOD = 4.0;
const BOB_FREQ = (2 * Math.PI) / BOB_PERIOD;
const NUM_SAMPLES = 8; // points per leg for smooth curve

// Convert Catmull-Rom spline points to SVG cubic bezier path
function catmullRomToBezierPath(points) {
  if (points.length < 2) return "";
  let d = `M ${points[0].x} ${points[0].y}`;

  for (let i = 0; i < points.length - 1; i++) {
    const p0 = points[Math.max(0, i - 1)];
    const p1 = points[i];
    const p2 = points[i + 1];
    const p3 = points[Math.min(points.length - 1, i + 2)];

    // Catmull-Rom to cubic bezier control points
    const cp1x = p1.x + (p2.x - p0.x) / 6;
    const cp1y = p1.y + (p2.y - p0.y) / 6;
    const cp2x = p2.x - (p3.x - p1.x) / 6;
    const cp2y = p2.y - (p3.y - p1.y) / 6;

    d += ` C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${p2.x} ${p2.y}`;
  }
  return d;
}

// Sample points along a leg with traveling wave displacement
function sampleLeg(topX, topY, botX, botY, t, phase, amp, speed, bobDrag, mouseInfluence) {
  const points = [];
  const len = botY - topY;

  for (let i = 0; i <= NUM_SAMPLES; i++) {
    const frac = i / NUM_SAMPLES;
    const waveFrac = frac * frac;
    const travelDelay = frac * 1.5;

    const w1 = Math.sin(t * speed * 2 + phase - travelDelay) * amp * waveFrac;
    const w2 = Math.sin(t * speed * 1.3 + phase + 1.8 - travelDelay * 0.7) * amp * 0.3 * waveFrac;
    const w3 = Math.sin(t * speed * 3.0 + phase + 0.5 - travelDelay * 1.2) * amp * 0.12 * waveFrac;

    const bobEffect = bobDrag * waveFrac;

    const baseX = topX + (botX - topX) * frac;
    const baseY = topY + len * frac;

    // Mouse influence: push tentacle points away from cursor, more at tips
    let mx = 0, my = 0;
    if (mouseActive) {
      const px = baseX + w1 + w2 + w3;
      const py = baseY + bobEffect;
      const ddx = px - mouseX;
      const ddy = py - mouseY;
      const dist = Math.sqrt(ddx * ddx + ddy * ddy);
      const influence = Math.max(0, 1 - dist / 250) * waveFrac * mouseInfluence;
      if (dist > 1) {
        mx = (ddx / dist) * influence * 10;
        my = (ddy / dist) * influence * 5;
      }
    }

    points.push({
      x: baseX + w1 + w2 + w3 + mx,
      y: baseY + bobEffect + my
    });
  }
  return points;
}

// Smoothed thinking blend (0 = idle, 1 = full thinking), updated in animate loop
let thinkBlend = 0;

function buildUPath(pair, t) {
  const { tlx, tly, trx, try_, blx, bly, brx, bry, phase, amp, speed } = pair;

  // Smooth transition: blend between idle and thinking tentacle params
  const effSpeed = speed + (speed * 1.5) * thinkBlend;  // up to 2.5x
  const effAmp = amp + (amp * 0.3) * thinkBlend;        // up to 1.3x

  const bobPhase = Math.sin(t * BOB_FREQ - 0.8);
  const bobDrag = bobPhase * 12;

  const leftPts = sampleLeg(tlx, tly, blx, bly, t, phase, effAmp, effSpeed, bobDrag, 1.0);
  const rightPts = sampleLeg(trx, try_, brx, bry, t, phase + 0.35, effAmp, effSpeed, bobDrag, 1.0);

  const arcRadius = (trx - tlx) / 2;
  const topCenterX = (tlx + trx) / 2;
  const arcPts = [];
  const ARC_SAMPLES = 6;
  for (let i = 0; i <= ARC_SAMPLES; i++) {
    const angle = Math.PI + (Math.PI * i / ARC_SAMPLES);
    arcPts.push({
      x: topCenterX + Math.cos(angle) * arcRadius,
      y: tly - arcRadius + Math.sin(angle) * arcRadius
    });
  }

  const leftReversed = [...leftPts].reverse();
  const allPoints = [...leftReversed, ...arcPts.slice(1, -1), ...rightPts];
  const d = catmullRomToBezierPath(allPoints);

  const lEnd = leftPts[leftPts.length - 1];
  const rEnd = rightPts[rightPts.length - 1];

  return { d, lbx: lEnd.x, lby: lEnd.y, rbx: rEnd.x, rby: rEnd.y };
}

function animate(time) {
  const t = time / 1000;

  // Smooth thinking blend: ramp up/down over ~0.5s
  const thinkTarget = t < thinkingUntil ? 1 : 0;
  thinkBlend += (thinkTarget - thinkBlend) * 0.05;
  if (thinkBlend < 0.001) thinkBlend = 0;
  if (thinkBlend > 0.999) thinkBlend = 1;

  // Click pulse: decays over 0.6s
  const pulseDt = t - pulseTime;
  const pulseScale = pulseDt < 0.6 ? 1 + 0.3 * Math.sin(pulseDt * Math.PI / 0.6) * Math.exp(-pulseDt * 3) : 1;

  pairEls.forEach(pair => {
    const { paths, bulbL, bulbR } = pair;
    const { d, lbx, lby, rbx, rby } = buildUPath(pair, t);

    paths.forEach(p => p.setAttribute("d", d));

    // Bulbs follow endpoints with -10 degree tilt + click pulse
    const bScale = pulseScale;
    bulbL.c.setAttribute("cx", lbx);
    bulbL.c.setAttribute("cy", lby);
    bulbL.g.setAttribute("transform",
      `translate(${lbx}, ${lby}) rotate(-10) scale(${bScale}) translate(${-lbx}, ${-lby})`);

    bulbR.c.setAttribute("cx", rbx);
    bulbR.c.setAttribute("cy", rby);
    bulbR.g.setAttribute("transform",
      `translate(${rbx}, ${rby}) rotate(-10) scale(${bScale}) translate(${-rbx}, ${-rby})`);
  });

  // --- Thinking effects ---
  const isThinking = t < thinkingUntil;
  const thinkElapsed = t - thinkingStarted;

  // Question mark bubbles - one at a time, every ~1s
  qMarks.forEach(qm => {
    if (isThinking) {
      const cycleDuration = 1.8; // each bubble's full life
      const totalCycle = cycleDuration * qMarks.length; // stagger across all
      const localT = ((thinkElapsed - qm.delay) % totalCycle);
      if (thinkElapsed >= qm.delay && localT < cycleDuration) {
        const frac = localT / cycleDuration;
        const opacity = frac < 0.12 ? frac / 0.12 : frac > 0.65 ? (1 - frac) / 0.35 : 1;
        const riseY = qm.startY - frac * 140;
        const driftX = qm.startX + Math.sin(frac * Math.PI) * qm.driftX * 0.6;
        qm.el.setAttribute("x", driftX);
        qm.el.setAttribute("y", riseY);
        qm.el.setAttribute("opacity", opacity * 0.85);
      } else {
        qm.el.setAttribute("opacity", "0");
      }
    } else {
      qm.el.setAttribute("opacity", "0");
    }
  });

  // Bell electric effects: inner = strong, outer = subtle
  if (isThinking) {
    const pulse = 0.5 + 0.5 * Math.sin(t * 6);
    const flash = Math.random() > 0.92 ? 1 : 0;
    const intensity = Math.min(1, pulse + flash * 0.5);

    // Inner bell: strong electric blue
    const ir = Math.round(40 + intensity * 96);
    const ig = Math.round(50 + intensity * 154);
    const ib = Math.round(80 + intensity * 175);
    bellInner.style.fill = `rgba(${ir}, ${ig}, ${ib}, ${0.3 + intensity * 0.5})`;

    // Outer bell: transition between white and light blue
    const outerWave = 0.5 + 0.5 * Math.sin(t * 3.5);
    const or_ = Math.round(255 - outerWave * 95);   // 255 -> 160
    const og = Math.round(255 - outerWave * 35);     // 255 -> 220
    const ob = 255;                                    // stays 255
    bellOuter.style.fill = `rgba(${or_}, ${og}, ${ob}, 0.35)`;

    // Lightning bolts
    lightningGroup.setAttribute("opacity", "1");
    lightningEls.forEach((lg, i) => {
      const flicker = Math.sin(t * 18 + i * 4.3) * Math.sin(t * 31 + i * 7.9);
      const show = flicker > 0.4 || flash;
      lg.setAttribute("opacity", show ? (0.6 + Math.random() * 0.4) : 0);
      if (show) lg.setAttribute("stroke-width", 1.5 + Math.random() * 2);
    });
  } else {
    bellInner.style.fill = "";
    bellOuter.style.fill = "";
    const curOp = parseFloat(lightningGroup.getAttribute("opacity"));
    lightningGroup.setAttribute("opacity", Math.max(0, curOp - 0.08));
    if (curOp <= 0) lightningEls.forEach(lg => lg.setAttribute("opacity", "0"));
  }

  requestAnimationFrame(animate);
}

// Animate all decorative elements - with counter-bob so they float independently
function animateDecorations(time) {
  const t = time / 1000;

  // Counter-bob: cancel out the CSS float animation on the container
  // CSS float: 0 -> -20px -> 0 over 4s ≈ -10 + 10*cos(PI*t/2)
  // Counter: +10 - 10*cos(PI*t/2) but partially - we want ~70% decoupled
  const counterBob = (10 - 10 * Math.cos(t * BOB_FREQ)) * 0.7;

  // Additive thinking wobble: gentle extra movement blended by thinkBlend
  // This adds on top of existing positions so no teleporting
  function thinkWobble(t, i, amp) {
    return {
      dx: Math.sin(t * 1.8 + i * 2.7) * amp * thinkBlend,
      dy: Math.cos(t * 1.4 + i * 3.1) * amp * 0.7 * thinkBlend,
    };
  }

  // Gears
  gearEls.forEach((el, i) => {
    const cfg = gearConfig[i];
    const dx = Math.sin(t * cfg.driftSpeed + cfg.driftPhase) * cfg.driftAmp
             + Math.sin(t * cfg.driftSpeed * 0.45 + cfg.driftPhase + 2.3) * cfg.driftAmp * 0.4
             + Math.cos(t * cfg.driftSpeed * 0.25 + cfg.driftPhase + 4.1) * cfg.driftAmp * 0.2;
    const dy = Math.cos(t * cfg.driftSpeed * 0.55 + cfg.driftPhase + 1.1) * cfg.driftAmp * 0.8
             + Math.sin(t * cfg.driftSpeed * 0.3 + cfg.driftPhase + 3.5) * cfg.driftAmp * 0.3
             + counterBob;
    const tw = thinkWobble(t, i, 8);
    const angle = t * cfg.spinSpeed * 360 * cfg.spinDir;
    el.setAttribute("transform",
      `translate(${dx + tw.dx}, ${dy + tw.dy}) translate(${cfg.cx}, ${cfg.cy}) scale(0.75) translate(${-cfg.cx}, ${-cfg.cy}) rotate(${angle % 360}, ${cfg.cx}, ${cfg.cy})`);
    const shimmer = thinkBlend > 0.01 ? 0.55 + 0.35 * Math.sin(t * 4 + i * 1.5) * thinkBlend : 0.55;
    el.setAttribute("opacity", shimmer);
    el.style.filter = thinkBlend > 0.01 ? `drop-shadow(0 0 ${(3 + 2 * Math.sin(t * 5 + i)) * thinkBlend}px rgba(136,204,255,${0.6 * thinkBlend}))` : "";
  });

  // Stars
  starEls.forEach((el, i) => {
    const cfg = starConfig[i];
    const dx = Math.sin(t * cfg.driftSpeed + cfg.driftPhase) * cfg.driftAmp
             + Math.cos(t * cfg.driftSpeed * 0.5 + cfg.driftPhase + 1.5) * cfg.driftAmp * 0.4;
    const dy = Math.cos(t * cfg.driftSpeed * 0.6 + cfg.driftPhase + 0.8) * cfg.driftAmp * 0.7
             + Math.sin(t * cfg.driftSpeed * 0.35 + cfg.driftPhase + 2.5) * cfg.driftAmp * 0.25
             + counterBob;
    const tw = thinkWobble(t, i + 4, 10);
    const idleOp = 0.3 + 0.35 * (0.5 + 0.5 * Math.sin(t * cfg.twinkleSpeed + cfg.twinklePhase));
    const thinkOp = 0.5 + 0.5 * Math.sin(t * cfg.twinkleSpeed * 2.5 + cfg.twinklePhase);
    const baseOpacity = idleOp + (thinkOp - idleOp) * thinkBlend;
    el.setAttribute("transform",
      `translate(${dx + tw.dx}, ${dy + tw.dy}) translate(${cfg.cx}, ${cfg.cy}) scale(0.75) translate(${-cfg.cx}, ${-cfg.cy})`);
    el.setAttribute("opacity", baseOpacity);
    el.style.filter = thinkBlend > 0.01 ? `drop-shadow(0 0 ${(4 + 3 * Math.sin(t * 6 + i * 2)) * thinkBlend}px rgba(136,204,255,${0.7 * thinkBlend}))` : "";
  });

  // Diamonds
  diamondEls.forEach((el, i) => {
    const cfg = diamondConfig[i];
    const dx = Math.sin(t * cfg.driftSpeed + cfg.driftPhase) * cfg.driftAmp
             + Math.cos(t * cfg.driftSpeed * 0.5 + cfg.driftPhase + 1.8) * cfg.driftAmp * 0.35;
    const dy = Math.cos(t * cfg.driftSpeed * 0.6 + cfg.driftPhase + 0.5) * cfg.driftAmp * 0.65
             + Math.sin(t * cfg.driftSpeed * 0.35 + cfg.driftPhase + 2.8) * cfg.driftAmp * 0.2
             + counterBob;
    const tw = thinkWobble(t, i + 6, 7);
    const scale = 0.65 + 0.1 * (0.5 + 0.5 * Math.sin(t * cfg.pulseSpeed + cfg.pulsePhase));
    const idleOp = 0.35 + 0.25 * (0.5 + 0.5 * Math.sin(t * cfg.pulseSpeed + cfg.pulsePhase + 0.5));
    const thinkOp = 0.5 + 0.4 * (0.5 + 0.5 * Math.sin(t * cfg.pulseSpeed * 2 + cfg.pulsePhase + 0.5));
    const opacity = idleOp + (thinkOp - idleOp) * thinkBlend;
    el.setAttribute("transform",
      `translate(${dx + tw.dx}, ${dy + tw.dy}) translate(${cfg.cx}, ${cfg.cy}) scale(${scale}) translate(${-cfg.cx}, ${-cfg.cy})`);
    el.setAttribute("opacity", opacity);
    el.style.filter = thinkBlend > 0.01 ? `drop-shadow(0 0 ${(3 + 2 * Math.sin(t * 4.5 + i * 1.8)) * thinkBlend}px rgba(136,204,255,${0.5 * thinkBlend}))` : "";
  });

  requestAnimationFrame(animateDecorations);
}
requestAnimationFrame(animateDecorations);

// --- Bell breathing animation ---
// Three nested dome layers: outer (cls-13), middle (cls-12), inner (cls-11)
const bellOuter = svg.querySelector("path.cls-13");
const bellMiddle = svg.querySelector("path.cls-12");
const bellInner = svg.querySelector("path.cls-11");

// Transform origin at center-bottom of bell dome
const BELL_CX = 614;
const BELL_BASE_Y = 397;

function animateBell(time) {
  const t = time / 1000;

  // Sync with bob cycle
  const bobWave = Math.sin(t * BOB_FREQ);

  // Click pulse for bell: quick squash-stretch
  const pulseDt = t - pulseTime;
  const bellPulse = pulseDt < 0.5 ? 0.04 * Math.sin(pulseDt * Math.PI / 0.5) * Math.exp(-pulseDt * 4) : 0;

  // Jelly wobble: velocity-based skew + squash
  // When moving sideways, the bell skews (lags behind like jelly)
  // When changing direction, it overshoots and wobbles
  const jellySkewX = smoothVelX * 280;  // horizontal skew from lateral movement
  const jellySquashX = Math.abs(smoothVelX) * 52.5;  // widens when moving fast
  const jellySquashY = Math.abs(smoothVelX) * -28;  // compresses vertically when moving fast

  // Outer shell
  const outerSx = 1 + bobWave * 0.018 + bellPulse + jellySquashX * 0.006;
  const outerSy = 1 - bobWave * 0.0144 - bellPulse * 0.7 + jellySquashY * 0.006;
  const outerSkew = jellySkewX * 0.6;
  bellOuter.setAttribute("transform",
    `translate(${BELL_CX * (1 - outerSx)}, ${BELL_BASE_Y * (1 - outerSy)}) scale(${outerSx}, ${outerSy}) skewX(${outerSkew})`);

  // Middle shell: slightly more jelly
  const midSx = 1 + bobWave * 0.0264 + bellPulse * 1.3 + jellySquashX * 0.008;
  const midSy = 1 - bobWave * 0.0216 - bellPulse * 0.9 + jellySquashY * 0.008;
  const midSkew = jellySkewX * 0.9;
  bellMiddle.setAttribute("transform",
    `translate(${BELL_CX * (1 - midSx)}, ${BELL_BASE_Y * (1 - midSy)}) scale(${midSx}, ${midSy}) skewX(${midSkew})`);

  // Inner shell: most jelly wobble
  const innerSx = 1 + bobWave * 0.036 + bellPulse * 1.6 + jellySquashX * 0.01;
  const innerSy = 1 - bobWave * 0.03 - bellPulse * 1.1 + jellySquashY * 0.01;
  const innerSkew = jellySkewX * 1.2;
  bellInner.setAttribute("transform",
    `translate(${BELL_CX * (1 - innerSx)}, ${BELL_BASE_Y * (1 - innerSy)}) scale(${innerSx}, ${innerSy}) skewX(${innerSkew})`);

  requestAnimationFrame(animateBell);
}
requestAnimationFrame(animateBell);

// Particles
for (let i = 0; i < 15; i++) {
  const p = document.createElement("div");
  p.className = "particle";
  const sz = Math.random() * 4 + 2;
  p.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;animation-delay:${Math.random()*6}s;animation-duration:${Math.random()*4+4}s`;
  document.body.appendChild(p);
}
</script>
